project_id = "stockdraft"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = false

# Auth-gated functions: Supabase verifies the JWT before invoking.
[functions.create-league]
verify_jwt = true
[functions.join-league]
verify_jwt = true
[functions.approve-player]
verify_jwt = true
[functions.start-draft]
verify_jwt = true
[functions.make-pick]
verify_jwt = true
[functions.auto-draft]
verify_jwt = true
[functions.execute-trade]
verify_jwt = true
[functions.delete-league]
verify_jwt = true
[functions.queue-ticker]
verify_jwt = true

# Public functions: anonymous leaderboard / cron sweeps.
[functions.fetch-prices]
verify_jwt = false
[functions.lookup-ticker]
verify_jwt = false
[functions.finalize-league]
verify_jwt = false
